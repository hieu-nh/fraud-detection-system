name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ===========================================================================
  # Lint & Code Quality
  # ===========================================================================
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lint tools
        run: pip install flake8 black isort

      - name: Run flake8
        run: flake8 app/ scripts/ tests/ --max-line-length=120 --ignore=E501,W503

      - name: Check black formatting
        run: black --check app/ scripts/ tests/

      - name: Check import ordering
        run: isort --check-only app/ scripts/ tests/

  # ===========================================================================
  # Unit & Integration Tests
  # ===========================================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run API tests
        run: pytest tests/test_api.py -v --cov=app --cov-report=xml

      - name: Run model unit tests (no data required)
        run: pytest tests/test_model.py::TestRiskLevel tests/test_model.py::TestFeatureEngineering -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ===========================================================================
  # Build Docker Image
  # ===========================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: fraudshield-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image builds successfully
        run: |
          docker build -t fraudshield-api:test .
          echo "Docker build successful"

  # ===========================================================================
  # Deploy (main branch only)
  # ===========================================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "✅ All checks passed!"
          echo "🚀 Ready to deploy commit: ${{ github.sha }}"
          echo "📦 Image: fraudshield-api:${{ github.sha }}"
          echo ""
          echo "To deploy manually:"
          echo "  docker compose up --build -d"